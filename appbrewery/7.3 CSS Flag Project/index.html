    <title>CSS Flag Project</title>
    <style>
      /* Write your CSS Code here */
      * {
        margin: 0px;
        padding: 0px;
      }
      .flag {
        background-color: #ce1126;
        width: 900px;
        height: 600px;
        position: relative;
        color: white;
      }

      .flag > div {
        width: 100%;
        height: 300px;
        background-color: #002868;
        position: absolute;
        top: 150px;
        color: black;
        
      }

      .flag > div > div{
        width: 200px;
        height: 200px;
        background-color: white;
        border-radius: 50%;
        position: relative;
        top: 50px;
        left: 350px;
      }

      p{
        margin: 0;
        font-size: 5rem;
        text-align: center;

      }
